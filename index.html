<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fluent</title>

<style>

body{
font-family: Arial, sans-serif;
background:#FFFDF7;
margin:0;
text-align:center;
}

h1{
margin-top:40px;
font-size:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:50px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

.card img{
width:140px;
margin-bottom:10px;
}

.card h2{
font-size:18px;
}

</style>
</head>

<body>

<h1>Fluent</h1>

<div class="cards">

<div class="card" onclick="location.href='apps/library/library.html'">
<img src="shared/assets/images/books.png">
<h2>Books</h2>
</div>

<div class="card" onclick="location.href='apps/exams/exams.html'">
<img src="shared/assets/images/exams.png">
<h2>Exams</h2>
</div>

<div class="card" onclick="location.href='apps/decoding/decoding.html'">
<img src="shared/assets/images/literacy.png">
<h2>Read Fluently Literacy</h2>
</div>

<div class="card" onclick="location.href='apps/support-plan/support-plan.html'">
<img src="shared/assets/images/support-plan.png">
<h2>Individual Support Plan</h2>
</div>

<div class="card" onclick="location.href='apps/teachers/teachers.html'">
<img src="shared/assets/images/teachers.png">
<h2>Teachers</h2>
</div>

</div>

</body>
</html>
