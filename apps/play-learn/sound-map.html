<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluent | Sound Map</title>
  <style>
    :root {
      --bg: #09162b;
      --surface: #102446;
      --text: #f4f8ff;
      --muted: #c7d8f5;
      --line: rgba(255, 255, 255, 0.14);
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      --shadow-hover: 0 16px 34px rgba(0, 0, 0, 0.34);
      --success: #39d12f;
      --warn: #ffb01f;
      --danger: #ff4d4d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #15386f 0%, #09162b 45%, #060f1d 100%);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      text-decoration: none;
      color: #ffd76a;
      font-weight: 700;
    }

    .back-link:hover,
    .back-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    .hero {
      background: linear-gradient(135deg, rgba(18,44,86,0.95), rgba(10,24,48,0.96));
      border: 2px solid rgba(255,215,106,0.5);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: #ffffff;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 1rem;
    }

    .sound-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .sound-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
      padding: 18px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }

    .sound-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(255,255,255,0.28);
    }

    .sound-card.active {
      border-color: #19d3ff;
      box-shadow: 0 0 0 2px rgba(25,211,255,0.25), var(--shadow-hover);
    }

    .sound-card.done {
      background: linear-gradient(135deg, rgba(57,209,47,0.25), rgba(31,159,26,0.15));
      border-color: rgba(57,209,47,0.35);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .sound-pattern {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
    }

    .stage-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, #27d8ff, #1f6fff);
      color: white;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .card-instruction {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      min-height: 44px;
    }

    .status-line {
      min-height: 24px;
      margin-bottom: 12px;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 700;
    }

    .status-line.good { color: var(--success); }
    .status-line.warn { color: var(--warn); }
    .status-line.bad { color: var(--danger); }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 6px;
      margin-bottom: 12px;
    }

    .word-chip {
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
      color: #e6f0ff;
      font-weight: 700;
      transition: 0.18s ease;
    }

    .word-chip.speaking {
      background: linear-gradient(#ffb01f, #ff7a00);
      color: white;
      border: none;
    }

    .word-chip.locked { opacity: 0.55; }

    .word-chip.letter-focus {
      background: linear-gradient(#27d8ff, #1f6fff);
      color: white;
      border: none;
    }

    .control-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .play-btn,
    .next-btn,
    .record-btn {
      border: none;
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(90deg, #19d3ff, #6b39ea);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .play-btn:disabled,
    .next-btn:disabled,
    .record-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .stars-box {
      display: none;
      margin-top: 10px;
      border-radius: 16px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(255,215,106,0.25), rgba(255,159,26,0.15));
      border: 1px solid rgba(255,215,106,0.5);
      color: #ffd76a;
      font-weight: 700;
      text-align: center;
    }

    .stars-box.show { display: block; }

    .stars {
      font-size: 1.4rem;
      margin-bottom: 6px;
    }

    .help-note {
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.94rem;
    }

    @media (max-width: 860px) {
      .sound-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .page { padding: 18px 14px 30px; }
      .sound-pattern { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="./sound-map-home.html">← Back to Sound Groups</a>

    <section class="hero">
      <h1>🗺️ Sound Map</h1>
      <p>
        Tap a card to begin. Fluent will say the letter names, then the letter sounds,
        then the sound, then read the words. The learner can then record their own reading.
      </p>
    </section>

    <section id="soundGrid" class="sound-grid" aria-label="Sound families"></section>

    <p class="help-note">
      After the learner is recorded, press <strong>Play my reading</strong> or <strong>Next</strong>.
    </p>
  </main>

  <script>
  const LETTER_NAME_AUDIO_MAP = {
  o: "../../shared/assets/sounds/common-consonant-sounds/o-sound.mp3"
};

const LETTER_SOUND_MAP = {
  a: "../../shared/assets/sounds/shout-vowels/a.mp3",
  b: "../../shared/assets/sounds/common-consonant-sounds/b.mp3",
  c: "../../shared/assets/sounds/common-consonant-sounds/c hard.mp3",
  d: "../../shared/assets/sounds/common-consonant-sounds/d.mp3",
  e: "../../shared/assets/sounds/shout-vowels/e.mp3",
  g: "../../shared/assets/sounds/common-consonant-sounds/g.mp3",
  i: "../../shared/assets/sounds/shout-vowels/i.mp3",
  n: "../../shared/assets/sounds/common-consonant-sounds/n.mp3",

  o: "../../shared/assets/sounds/common-consonant-sounds/o-sound.mp3",

  p: "../../shared/assets/sounds/common-consonant-sounds/p.mp3",
  t: "../../shared/assets/sounds/common-consonant-sounds/t.mp3",
  u: "../../shared/assets/sounds/shout-vowels/u.mp3",
  r: "../../shared/assets/sounds/common-consonant-sounds/r.mp3",
  sh: "../../shared/assets/sounds/digraphs/digraphs/sh.mp3"
};

    const SOUND_MAP = {
      an: "../../shared/assets/sounds/a-family/an.mp3",
      at: "../../shared/assets/sounds/a-family/at.mp3",
      ap: "../../shared/assets/sounds/a-family/ap.mp3",

      en: "../../shared/assets/sounds/e-family/en.mp3",
      ed: "../../shared/assets/sounds/e-family/ed.mp3",
      eg: "../../shared/assets/sounds/e-family/eg.mp3",

      it: "../../shared/assets/sounds/i-family/it.mp3",
      ig: "../../shared/assets/sounds/i-family/ig.mp3",
      in: "../../shared/assets/sounds/i-family/in.mp3",
      ip: "../../shared/assets/sounds/i-family/ip.mp3",

      op: "../../shared/assets/sounds/o-family/op.mp3",
      og: "../../shared/assets/sounds/o-family/og.mp3",

      ug: "../../shared/assets/sounds/u-family/ug.mp3",

      ack: "../../shared/assets/sounds/common-phonograms/Common Phonograms/ack.mp3",
      igh: "../../shared/assets/sounds/advanced-vowel-teams/Advanced Vowel Teams/igh.mp3",
      ar: "../../shared/assets/sounds/Controlled R/ar.mp3",
      sh: "../../shared/assets/sounds/digraphs/digraphs/sh.mp3"
    };

    const allSoundFamilies = {
      an: { pattern: "an", words: ["man", "can", "fan", "pan"], letters: ["a", "n"] },
      at: { pattern: "at", words: ["cat", "bat", "hat", "mat"], letters: ["a", "t"] },
      ap: { pattern: "ap", words: ["cap", "map", "tap", "lap"], letters: ["a", "p"] },

      en: { pattern: "en", words: ["pen", "hen", "ten", "den"], letters: ["e", "n"] },
      ed: { pattern: "ed", words: ["bed", "red", "fed", "wed"], letters: ["e", "d"] },
      eg: { pattern: "eg", words: ["leg", "peg", "beg"], letters: ["e", "g"] },

      it: { pattern: "it", words: ["sit", "bit", "hit", "fit"], letters: ["i", "t"] },
      ig: { pattern: "ig", words: ["pig", "wig", "dig", "fig"], letters: ["i", "g"] },
      in: { pattern: "in", words: ["pin", "fin", "win", "tin"], letters: ["i", "n"] },
      ip: { pattern: "ip", words: ["sip", "lip", "dip", "tip"], letters: ["i", "p"] },

      op: { pattern: "op", words: ["top", "hop", "mop", "pop"], letters: ["o", "p"] },
      og: { pattern: "og", words: ["dog", "log", "jog", "hog"], letters: ["o", "g"] },

      ug: { pattern: "ug", words: ["bug", "hug", "mug", "rug"], letters: ["u", "g"] },

      ack: { pattern: "ack", words: ["back", "pack", "sack"], letters: ["a", "c", "k"] },
      igh: { pattern: "igh", words: ["light", "night", "right"], letters: ["i", "gh", "t"] },
      ar: { pattern: "ar", words: ["car", "far", "jar"], letters: ["a", "r"] },
      sh: { pattern: "sh", words: ["shop", "ship", "shell"], letters: ["sh"] }
    };

    const params = new URLSearchParams(window.location.search);
    const selectedGroup = params.get("group");

    const soundFamilies = selectedGroup && allSoundFamilies[selectedGroup]
      ? [allSoundFamilies[selectedGroup]]
      : [
          allSoundFamilies.an,
          allSoundFamilies.at,
          allSoundFamilies.ap,
          allSoundFamilies.en,
          allSoundFamilies.it,
          allSoundFamilies.op,
          allSoundFamilies.ug,
          allSoundFamilies.og
        ];

    const soundGrid = document.getElementById("soundGrid");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let currentRecognition = null;
    let currentRecorder = null;
    let currentStream = null;
    let currentRunToken = 0;
    let currentAudio = null;
    let speakingCardId = null;

    function getPreferredVoice() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return null;

      return (
        voices.find(v => /en-za/i.test(v.lang)) ||
        voices.find(v => /en-gb/i.test(v.lang)) ||
        voices.find(v => /en-us/i.test(v.lang)) ||
        voices.find(v => /^en/i.test(v.lang)) ||
        voices[0]
      );
    }

    function renderCards() {
      soundGrid.innerHTML = "";

      soundFamilies.forEach((family, index) => {
        const card = document.createElement("article");
        card.className = "sound-card";
        card.id = `sound-card-${index}`;
        card.dataset.index = index;
        card.dataset.pattern = family.pattern;
        card.dataset.words = family.words.join(",");
        card.dataset.audioUrl = "";
        card.dataset.letters = (family.letters || []).join(",");
        card.dataset.completed = "false";
        card.dataset.wordsReady = "false";

        card.innerHTML = `
          <div class="card-top">
            <div class="sound-pattern">-${family.pattern}</div>
            <div class="stage-badge">Tap to start</div>
          </div>

          <p class="card-instruction">Tap this card to begin.</p>

          <div class="status-line">Ready.</div>

          <div class="word-list">
            ${family.words.map(word => `<span class="word-chip locked">${word}</span>`).join("")}
          </div>

          <div class="control-row">
            <button class="record-btn" type="button" disabled>🎤 My turn to read</button>
            <button class="play-btn" type="button" disabled>▶️ Play my reading</button>
            <button class="next-btn" type="button" disabled>➡️ Next</button>
          </div>

          <div class="stars-box">
            <div class="stars">⭐ ⭐ ⭐</div>
            <div class="stars-message">Press play my reading or press next to move to the next card.</div>
          </div>
        `;

        card.addEventListener("click", event => {
          if (event.target.closest("button")) return;
          runCardFlow(card);
        });

        card.querySelector(".record-btn").addEventListener("click", event => {
          event.stopPropagation();
          manualRecordReading(card);
        });

        card.querySelector(".play-btn").addEventListener("click", event => {
          event.stopPropagation();
          playLearnerReading(card);
        });

        card.querySelector(".next-btn").addEventListener("click", event => {
          event.stopPropagation();
          goToNextCard(card);
        });

        soundGrid.appendChild(card);
      });
    }

    function setActiveCard(card) {
      document.querySelectorAll(".sound-card").forEach(item => item.classList.remove("active"));
      card.classList.add("active");
    }

    function updateCard(card, statusText = "", statusType = "", instructionText = "", badgeText = "") {
      const status = card.querySelector(".status-line");
      const instruction = card.querySelector(".card-instruction");
      const badge = card.querySelector(".stage-badge");

      if (statusText) status.textContent = statusText;
      if (instructionText) instruction.textContent = instructionText;
      if (badgeText) badge.textContent = badgeText;

      status.classList.remove("good", "warn", "bad");
      if (statusType) status.classList.add(statusType);
    }

    function unlockWords(card) {
      card.querySelectorAll(".word-chip").forEach(chip => chip.classList.remove("locked"));
      card.dataset.wordsReady = "true";
    }

    function clearSpeakingState() {
      document.querySelectorAll(".word-chip").forEach(chip => {
        chip.classList.remove("speaking", "letter-focus");
      });
      speakingCardId = null;
    }

    function focusLetters(card, letters) {
      const created = letters.map(letter => {
        const chip = document.createElement("span");
        chip.className = "word-chip";
        chip.textContent = letter;
        return chip;
      });

      const wordList = card.querySelector(".word-list");
      wordList.innerHTML = "";
      created.forEach(chip => wordList.appendChild(chip));
      return created;
    }

    function restoreWords(card) {
      const words = (card.dataset.words || "")
        .split(",")
        .map(word => word.trim())
        .filter(Boolean);

      const wordList = card.querySelector(".word-list");
      wordList.innerHTML = words
        .map(word => `<span class="word-chip ${card.dataset.wordsReady === "true" ? "" : "locked"}">${word}</span>`)
        .join("");
    }

    function setButtons(card, canRecord, canPlay, canNext) {
      card.querySelector(".record-btn").disabled = !canRecord;
      card.querySelector(".play-btn").disabled = !canPlay;
      card.querySelector(".next-btn").disabled = !canNext;
    }

    function showFinished(card) {
      card.classList.add("done");
      card.dataset.completed = "true";
      const box = card.querySelector(".stars-box");
      if (box) box.classList.add("show");

      setButtons(card, false, true, true);
      updateCard(
        card,
        "Press play my reading to hear your reading or press next to move to the next card.",
        "good",
        "Your reading has been recorded.",
        "Complete"
      );
    }

    function cancelAllAudio() {
      window.speechSynthesis.cancel();
      stopRecognition();

      if (currentAudio) {
        try {
          currentAudio.pause();
          currentAudio.currentTime = 0;
        } catch (error) {
          console.error("Audio stop failed:", error);
        }
      }
      currentAudio = null;
    }

    function stopRecognition() {
      if (currentRecognition) {
        try {
          currentRecognition.onresult = null;
          currentRecognition.onerror = null;
          currentRecognition.onend = null;
          currentRecognition.stop();
        } catch (error) {
          console.error("Recognition stop failed:", error);
        }
      }
      currentRecognition = null;
    }

    function stopRecordingIfNeeded() {
      if (currentRecorder && currentRecorder.state === "recording") {
        try {
          currentRecorder.stop();
        } catch (error) {
          console.error("Recorder stop failed:", error);
        }
      }
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function speakText(text, rate = 0.8) {
      return new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = rate;
        utterance.pitch = 1;
        utterance.volume = 1;

        const preferredVoice = getPreferredVoice();
        if (preferredVoice) utterance.voice = preferredVoice;

        utterance.onend = resolve;
        utterance.onerror = resolve;

        window.speechSynthesis.speak(utterance);
      });
    }

    function playAudioFile(src) {
      return new Promise(resolve => {
        if (!src) {
          resolve();
          return;
        }

        const audio = new Audio(src);
        currentAudio = audio;

        audio.onended = () => {
          currentAudio = null;
          resolve();
        };

        audio.onerror = () => {
          console.error("Audio failed:", src);
          currentAudio = null;
          resolve();
        };

        audio.play().catch(error => {
          console.error("Audio play failed:", error);
          currentAudio = null;
          resolve();
        });
      });
    }

    async function sayLetterName(letter) {
      const customNameAudio = LETTER_NAME_AUDIO_MAP[letter];
      if (customNameAudio) {
        await playAudioFile(customNameAudio);
      } else {
        await speakText(letter, 0.76);
      }
    }

    function playLetterSound(letter) {
      const key = letter === "b" ? "b" : letter;
      const src = LETTER_SOUND_MAP[key];
      if (!src) console.warn("Missing letter sound:", letter);
      return playAudioFile(src);
    }

    function playPatternAudio(pattern) {
      const src = SOUND_MAP[pattern];
      if (!src) console.warn("Missing phonics audio for pattern:", pattern);
      return playAudioFile(src);
    }

    async function sayLettersAndSound(card, token) {
      if (token !== currentRunToken) return false;

      const letters = (card.dataset.letters || "")
        .split(",")
        .map(letter => letter.trim())
        .filter(Boolean);

      const pattern = card.dataset.pattern;

      updateCard(
        card,
        "First, Fluent says the letter names, then the letter sounds, then the sound.",
        "warn",
        "Listen carefully.",
        "Listen"
      );

      const focused = focusLetters(card, letters);

      if (letters.length >= 1) {
        for (let i = 0; i < letters.length; i++) {
          focused[i].classList.add("letter-focus");
          await sayLetterName(letters[i]);
          if (token !== currentRunToken) return false;
          await wait(220);
          focused[i].classList.remove("letter-focus");
        }

        await speakText("listen to the sounds", 0.78);
        if (token !== currentRunToken) return false;

        for (let i = 0; i < letters.length; i++) {
          focused[i].classList.add("letter-focus");
          await playLetterSound(letters[i]);
          if (token !== currentRunToken) return false;
          await wait(180);
          focused[i].classList.remove("letter-focus");
        }

        await speakText("make the sound", 0.78);
        if (token !== currentRunToken) return false;

        await wait(160);
        await playPatternAudio(pattern);
        if (token !== currentRunToken) return false;
      }

      await wait(180);
      await playPatternAudio(pattern);
      if (token !== currentRunToken) return false;

      restoreWords(card);
      return true;
    }

    function listenForAnyAttempt(card, token) {
      return new Promise(resolve => {
        if (token !== currentRunToken) {
          resolve(false);
          return;
        }

        if (!SpeechRecognition) {
          updateCard(card, "The learner says the sound.", "warn", "Next, Fluent will read the words.", "Your turn");
          resolve(true);
          return;
        }

        const recognition = new SpeechRecognition();
        currentRecognition = recognition;
        recognition.lang = "en-US";
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        let resolved = false;

        updateCard(
          card,
          `${card.dataset.pattern}.`,
          "warn",
          `Say ${card.dataset.pattern}.`,
          "Your turn"
        );

        recognition.onresult = () => {
          if (resolved) return;
          resolved = true;
          currentRecognition = null;
          resolve(true);
        };

        recognition.onerror = () => {
          if (resolved) return;
          resolved = true;
          currentRecognition = null;
          resolve(true);
        };

        recognition.onend = () => {
          if (resolved) return;
          resolved = true;
          currentRecognition = null;
          resolve(true);
        };

        try {
          recognition.start();
        } catch (error) {
          console.error("Recognition start failed:", error);
          currentRecognition = null;
          resolve(true);
        }
      });
    }

    async function readWords(card, token) {
      if (token !== currentRunToken) return false;

      unlockWords(card);

      const words = (card.dataset.words || "")
        .split(",")
        .map(word => word.trim())
        .filter(Boolean);

      const chips = [...card.querySelectorAll(".word-chip")];
      speakingCardId = card.id;

      updateCard(
        card,
        "This is how we read these words.",
        "good",
        "Fluent is reading the words.",
        "Read words"
      );

      await speakText("This is how we read these words", 0.8);
      if (token !== currentRunToken) return false;

      for (let i = 0; i < words.length; i++) {
        if (token !== currentRunToken || speakingCardId !== card.id) return false;

        chips.forEach(chip => chip.classList.remove("speaking"));
        if (chips[i]) chips[i].classList.add("speaking");

        await speakText(words[i], 0.74);
        if (token !== currentRunToken) return false;

        await wait(120);
      }

      chips.forEach(chip => chip.classList.remove("speaking"));

      updateCard(
        card,
        "It is now your turn to read the words aloud.",
        "warn",
        "Press the button to start recording the learner.",
        "Your turn"
      );

      await speakText("It is now your turn to read the words aloud", 0.8);
      if (token !== currentRunToken) return false;

      setButtons(card, true, false, false);
      return true;
    }

    async function manualRecordReading(card) {
      cancelAllAudio();
      stopRecordingIfNeeded();
      setActiveCard(card);

      if (card.dataset.wordsReady !== "true") {
        updateCard(card, "Complete the card first.", "warn", "Tap the card to begin.", "Record");
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        updateCard(card, "Recording is not supported here.", "bad", "Try another browser.", "Record");
        return;
      }

      try {
        setButtons(card, false, false, false);

        updateCard(
          card,
          "Recording... read the words now.",
          "warn",
          "The learner reads and Fluent records the reading.",
          "Recording"
        );

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        currentStream = stream;

        const recorder = new MediaRecorder(stream);
        currentRecorder = recorder;
        const chunks = [];

        const audioChunksReady = new Promise(resolve => {
          recorder.ondataavailable = event => {
            if (event.data && event.data.size > 0) chunks.push(event.data);
          };

          recorder.onstop = () => {
            const audioBlob = new Blob(chunks, { type: "audio/webm" });
            const audioUrl = URL.createObjectURL(audioBlob);

            if (card.dataset.audioUrl) URL.revokeObjectURL(card.dataset.audioUrl);
            card.dataset.audioUrl = audioUrl;

            if (currentStream) {
              currentStream.getTracks().forEach(track => track.stop());
              currentStream = null;
            }

            currentRecorder = null;
            resolve(audioUrl);
          };
        });

        recorder.start();
        await wait(7000);

        if (recorder.state === "recording") recorder.stop();

        await audioChunksReady;
        showFinished(card);
      } catch (error) {
        console.error("Recording failed:", error);
        updateCard(card, "Microphone permission was blocked or recording failed.", "bad", "Try again.", "Record");
        setButtons(card, true, false, false);
      }
    }

    function playLearnerReading(card) {
      const audioUrl = card.dataset.audioUrl;
      if (!audioUrl) {
        updateCard(card, "No reading has been recorded yet.", "warn", "Press My turn to read first.", "Play");
        return;
      }

      cancelAllAudio();
      setActiveCard(card);

      updateCard(card, "Playing your reading...", "good", "Listen to your reading.", "Playback");

      const audio = new Audio(audioUrl);
      currentAudio = audio;

      audio.onended = () => {
        updateCard(card, "Playback finished. Press next to move to the next card.", "good", "Great work.", "Complete");
        currentAudio = null;
      };

      audio.onerror = () => {
        updateCard(card, "Could not play your reading.", "bad", "Try again.", "Playback");
        currentAudio = null;
      };

      audio.play().catch(error => {
        console.error("Playback failed:", error);
        updateCard(card, "Could not play your reading.", "bad", "Try again.", "Playback");
        currentAudio = null;
      });
    }

    function goToNextCard(card) {
      const currentIndex = Number(card.dataset.index);
      const nextIndex = currentIndex + 1;
      const nextCard = document.getElementById(`sound-card-${nextIndex}`);

      if (nextCard) {
        nextCard.scrollIntoView({ behavior: "smooth", block: "center" });
        setActiveCard(nextCard);
      } else {
        updateCard(card, "You finished the sound map cards.", "good", "Well done.", "Finished");
      }
    }

    async function runCardFlow(card) {
      currentRunToken += 1;
      const token = currentRunToken;

      cancelAllAudio();
      stopRecordingIfNeeded();
      clearSpeakingState();
      setActiveCard(card);
      setButtons(card, false, false, false);

      const box = card.querySelector(".stars-box");
      if (box) box.classList.remove("show");

      card.classList.remove("done");
      card.dataset.completed = "false";
      card.dataset.wordsReady = "false";

      const heard = await sayLettersAndSound(card, token);
      if (!heard) return;

      await wait(120);
      const spoke = await listenForAnyAttempt(card, token);
      if (!spoke) return;

      await wait(120);
      await readWords(card, token);
    }

    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.getVoices();
    };

    renderCards();
  </script>
</body>
</html>
