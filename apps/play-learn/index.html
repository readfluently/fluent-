<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Play & Learn</title>

<style>
body{
  font-family:Arial;
  background:#FFFDF7;
  text-align:center;
  margin:0;
}

h1{
  margin-top:40px;
  color:#1f2937;
}

.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
  padding:40px;
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  border-radius:15px;
  padding:30px;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
  font-weight:700;
  color:#1f2937;
}

.card:hover{
  transform:scale(1.05);
}

.card-memory{
  background:#eef8ff;
}

.card-build{
  background:#fff4e8;
}

.card-sound{
  background:#edf9ef;
}

.card-tap{
  background:#f3edff;
}

.card-grammar{
  background:#fff7e8;
}
</style>
</head>

<body>

<h1>Play & Learn</h1>

<div class="games">

  <div class="card card-memory" onclick="location.href='memory.html'">
    Memory Match
  </div>

  <div class="card card-build" onclick="location.href='build-word.html'">
    Build the Word
  </div>

  <div class="card card-sound">
    Sound Detective
  </div>

  <div class="card card-tap">
    Tap the Sound
  </div>

  <div class="card card-grammar" onclick="location.href='nouns-adjectives-game.html'">
    Nouns &amp; Adjectives Game
  </div>

</div>

</body>
</html>
