<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memory Match</title>

<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  background:#f6f6f6;
  margin:0;
  padding:20px;
}

h1{
  margin-top:10px;
  color:#333;
}

#levelTitle{
  margin-top:10px;
  color:#555;
}

#progressContainer{
  width:320px;
  height:12px;
  background:#ddd;
  margin:10px auto 20px auto;
  border-radius:10px;
  overflow:hidden;
}

#progressBar{
  height:100%;
  width:0%;
  background:#4CAF50;
  transition:width 0.3s;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,120px);
  gap:15px;
  justify-content:center;
  margin-top:30px;
}

.tile{
  width:120px;
  height:120px;
  background:#4CAF50;
  color:white;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border-radius:14px;
  user-select:none;
  transition:transform 0.2s, background 0.2s;
}

.tile:hover{
  transform:scale(1.04);
}

.tile.flipped{
  background:#CFE8CF;
  color:#333;
}

.tile.trophy{
  background:#D4AF37;
  color:white;
  font-size:44px;
  animation:bounce 0.6s infinite alternate;
}

@keyframes bounce{
  from{transform:translateY(0);}
  to{transform:translateY(-10px);}
}

#message{
  margin-top:25px;
  font-size:22px;
  font-weight:bold;
  color:#444;
}
</style>
</head>

<body>

<h1>Memory Match</h1>
<h2 id="levelTitle">Level 1</h2>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<div class="grid" id="grid"></div>

<div id="message"></div>

<script>
const levels = [
  ["bl","br","cl","cr"],
  ["fl","fr","gl","gr"],
  ["pl","sl","sm","sn"]
];

let currentLevel = 0;
let matchedPairs = 0;
let first = null;
let second = null;
let lockBoard = false;

const grid = document.getElementById("grid");
const levelTitle = document.getElementById("levelTitle");
const message = document.getElementById("message");
const progressBar = document.getElementById("progressBar");

function playSound(sound){
  let audio = new Audio(`/fluent-/shared/assets/sounds/beginning-blends/beginning-blends/${sound}.mp3`);
  audio.play().catch(() => {});
}

function playClap(){
  let audio = new Audio(`/fluent-/shared/assets/sounds/clap.mp3`);
  audio.play().catch(() => {});
}

function updateProgress(){
  const totalPairs = levels[currentLevel].length;
  const percent = (matchedPairs / totalPairs) * 100;
  progressBar.style.width = percent + "%";
}

function launchConfetti(){
  for(let i = 0; i < 40; i++){
    let confetti = document.createElement("div");

    confetti.style.position = "fixed";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.top = "-10px";
    confetti.style.width = "10px";
    confetti.style.height = "10px";
    confetti.style.background = ["#ff0","#f00","#0f0","#00f","#ff8800"][Math.floor(Math.random() * 5)];
    confetti.style.opacity = "0.8";
    confetti.style.zIndex = "999";
    confetti.style.pointerEvents = "none";

    document.body.appendChild(confetti);

    let fall = Math.random() * 3 + 2;

    confetti.animate(
      [
        { transform:"translateY(0) rotate(0deg)" },
        { transform:`translateY(100vh) rotate(${Math.random() * 720}deg)` }
      ],
      {
        duration: fall * 1000,
        easing: "linear"
      }
    );

    setTimeout(() => confetti.remove(), 4000);
  }
}

function loadLevel(){
  grid.innerHTML = "";
  message.innerHTML = "";
  first = null;
  second = null;
  matchedPairs = 0;
  lockBoard = false;
  progressBar.style.width = "0%";

  levelTitle.innerText = "Level " + (currentLevel + 1);

  const sounds = levels[currentLevel];
  let cards = [...sounds, ...sounds];

  cards.sort(() => 0.5 - Math.random());

  cards.forEach(sound => {
    let card = document.createElement("div");
    card.className = "tile";
    card.dataset.sound = sound;
    card.innerHTML = "?";
    card.onclick = () => flip(card);
    grid.appendChild(card);
  });
}

function flip(card){
  if(lockBoard) return;
  if(card.innerHTML !== "?") return;
  if(first === card) return;

  card.innerHTML = card.dataset.sound;
  playSound(card.dataset.sound);

  if(!first){
    first = card;
    return;
  }

  second = card;
  lockBoard = true;

  if(first.dataset.sound === second.dataset.sound){
    setTimeout(() => {
      first.classList.add("flipped");
      second.classList.add("flipped");

      matchedPairs++;
      updateProgress();

      first = null;
      second = null;
      lockBoard = false;

      checkLevelComplete();
    }, 500);
  } else {
    setTimeout(() => {
      first.innerHTML = "?";
      second.innerHTML = "?";
      first = null;
      second = null;
      lockBoard = false;
    }, 900);
  }
}

function checkLevelComplete(){
  const totalPairs = levels[currentLevel].length;

  if(matchedPairs === totalPairs){
    const allTiles = document.querySelectorAll(".tile");

    allTiles.forEach(tile => {
      tile.innerHTML = "🏆";
      tile.classList.remove("flipped");
      tile.classList.add("trophy");
    });

    playClap();
    launchConfetti();

    setTimeout(() => {
      currentLevel++;

      if(currentLevel < levels.length){
        loadLevel();
      } else {
        grid.innerHTML = "";
        levelTitle.innerText = "All Levels Complete";
        message.innerHTML = "Excellent work! You finished the game. 🏆👏🎉";
        progressBar.style.width = "100%";
      }
    }, 2500);
  }
}

loadLevel();
</script>

</body>
</html>
