<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homework Helper</title>

  <!-- ✅ CORRECT CSS LINK -->
  <link rel="stylesheet" href="./homework-help.css" />
</head>
<body>

  <div class="page-shell">

    <header class="topbar">
      <a class="pill-btn" href="../../index.html">← Back</a>
      <div class="pill-btn static">Homework Helper</div>
    </header>

    <section class="hero">
      <div class="hero-badge">📝 Homework Helper</div>
      <div class="hero-copy">
        Understand the homework task, try your own answer, then compare with a model answer.
      </div>
    </section>

    <main>

      <section class="tracker-card">

        <label>Homework instruction</label>
        <textarea id="instructionInput" placeholder="Example: Write 5 sentences about plants"></textarea>

        <label>Homework question</label>
        <textarea id="questionInput" placeholder="Example: Explain how plants make food"></textarea>

        <label>Type of task</label>
        <select id="taskType">
          <option value="auto">Auto detect</option>
          <option value="explain">Explain</option>
          <option value="describe">Describe</option>
          <option value="list">List</option>
          <option value="compare">Compare</option>
          <option value="paragraph">Paragraph</option>
        </select>

        <div class="controls">
          <button id="explainBtn" class="primary">Explain Task</button>
          <button id="readTaskBtn">Read Task</button>
          <button id="clearBtn">Clear</button>
        </div>

      </section>

      <section class="card">
        <h2>What this task wants you to do</h2>
        <div id="taskHelp">Click "Explain Task"</div>
      </section>

      <section class="tracker-card">

        <label>Your answer</label>
        <textarea id="learnerAnswer" placeholder="Write your answer first..."></textarea>

        <div class="controls">
          <button id="submitAttemptBtn" class="primary">I Have Tried</button>
          <button id="readMyAnswerBtn">Read My Answer</button>
        </div>

        <p id="statusText">Try your own answer first.</p>

      </section>

      <section class="card">
        <h2>Model answer</h2>
        <div id="modelAnswer">Model answer will appear after attempt.</div>

        <button id="readModelBtn">Read Model</button>
      </section>

    </main>

  </div>

  <!-- ✅ CORRECT JS LINK -->
  <script src="./homework-help.js"></script>

</body>
</html>
