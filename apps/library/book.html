<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chapter</title>

  <style>
    body{font-family:Arial; margin:0; background:#FFFDF7;}

    .topbar{
      position:sticky; top:0; z-index:10;
      display:flex; align-items:center; gap:10px;
      padding:12px 14px; background:#FFFDF7; border-bottom:1px solid #eee;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .topbar .btn{
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .topbar .status{
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .btn{
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #ddd;
      background:white;
      cursor:pointer;
    }

    .btn:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .status{
      font-size:13px;
      color:#555;
    }

    .wrap{
      display:grid;
      grid-template-columns: 1.5fr 1fr;
      gap:14px;
      padding:14px;
    }

    .card{
      background:white;
      border-radius:14px;
      padding:14px;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
    }

    h1{margin:8px 0 10px;}
    .meta{color:#555; font-size:14px; margin-bottom:10px;}

    .recorder{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    audio{
      width:100%;
      margin-top:10px;
    }

    .scrollText{
      max-height:55vh;
      overflow:auto;
      padding-right:6px;
    }

    .scrollWork{
      max-height:68vh;
      overflow:auto;
      padding-right:6px;
    }

    .text p{
      line-height:1.7;
      font-size:18px;
      margin:0 0 12px;
    }

    .term{
      color:#7b3ff2;
      font-weight:700;
      cursor:pointer;
    }

    .term:hover{
      text-decoration:underline;
    }

    textarea{
      width:100%;
      min-height:140px;
      resize:vertical;
      border:1px solid #ddd;
      border-radius:12px;
      padding:10px;
      font-size:15px;
    }

    .small{
      font-size:13px;
      color:#555;
    }

    .divider{
      height:1px;
      background:#eee;
      margin:12px 0;
    }

    .popup{
      position:fixed;
      left:50%;
      top:18%;
      transform:translateX(-50%);
      width:min(520px, calc(100% - 28px));
      max-height:70vh;
      overflow:auto;
      background:white;
      border:1px solid #e6e6e6;
      box-shadow:0 12px 30px rgba(0,0,0,0.16);
      border-radius:14px;
      padding:14px;
      z-index:9999;
      display:none;
    }

    .popupHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .popupTitle{
      font-weight:800;
      text-transform:capitalize;
    }

    .closeBtn{
      border:1px solid #ddd;
      background:#fff;
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
    }

    .dictionary-entry{
      margin-bottom:18px;
      padding:12px;
      background:#fff;
      border:1px solid #eee;
      border-radius:12px;
      transition:border-color .2s ease, box-shadow .2s ease;
    }

    .dictionary-entry h3{
      margin:0 0 8px 0;
    }

    .chapter-link{
      display:block;
      padding:12px 14px;
      margin-bottom:8px;
      border:1px solid #e6e6e6;
      border-radius:12px;
      background:#fff;
      cursor:pointer;
      font-weight:600;
    }

    .chapter-link:hover{
      background:#f8f6ff;
      border-color:#d8c8ff;
    }

    .chapter-link.current{
      background:#f3edff;
      border-color:#7b3ff2;
      color:#5b21b6;
    }

    .searchBox{
      width:100%;
      padding:12px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:15px;
      margin-bottom:12px;
    }

    .search-result{
      display:block;
      padding:12px 14px;
      margin-bottom:8px;
      border:1px solid #e6e6e6;
      border-radius:12px;
      background:#fff;
      cursor:pointer;
    }

    .search-result:hover{
      background:#f8f6ff;
      border-color:#d8c8ff;
    }

    .search-empty{
      color:#777;
      font-size:14px;
      padding:8px 2px;
    }

    @media (max-width: 820px){
      .wrap{
        display:flex;
        flex-direction:column;
        gap:12px;
      }

      .scrollText{max-height:42vh;}
      .scrollWork{max-height:42vh;}
    }
  </style>
</head>

<body>

  <div class="topbar">
    <button class="btn" onclick="history.back()">← Back</button>
    <button class="btn" id="howBtn">How This Works</button>
    <button class="btn" id="chaptersBtn">Chapters</button>
    <button class="btn" id="dictBtn">Dictionary</button>
    <button class="btn" id="dictSearchBtn">Search</button>
    <button class="btn" id="nextChapterBtn">Next Chapter →</button>
    <div class="status" id="status">Loading…</div>
  </div>

  <div class="wrap">
    <div class="card">
      <h1 id="chapterTitle">Loading…</h1>
      <div class="meta" id="chapterMeta"></div>

      <div id="chapterProgressWrap" style="margin:10px 0 14px;">
        <div class="small" id="chapterProgressText">Progress</div>
        <div style="height:10px; background:#eee; border-radius:999px; overflow:hidden; margin-top:6px;">
          <div id="chapterProgressBar" style="height:10px; width:0%; background:#7b3ff2;"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="recorder">
        <button class="btn" id="recBtn">⏺ Record</button>
        <button class="btn" id="stopRecBtn" disabled>⏹ Stop</button>
        <button class="btn" id="playBtn" disabled>▶ Play</button>
        <button class="btn" id="clearBtn" disabled>🧹 Clear</button>
        <button class="btn" id="downloadBtn" disabled>⬇ Download</button>
        <div class="small" id="recStatus"></div>
      </div>

      <audio id="player" controls style="display:none;"></audio>

      <div class="divider"></div>

      <div class="scrollText">
        <div class="text" id="chapterText"></div>
      </div>
    </div>

    <div class="card">
      <div class="scrollWork" id="worksheetBody">
        <h2 style="margin-top:0;">Worksheet</h2>
        <div class="small">Type your answers here. They save on this device.</div>

        <div class="divider"></div>

        <h3 style="margin:0 0 6px;" id="worksheetTitle">Paraphrasing</h3>
        <div class="small" id="worksheetPrompt">Write the main idea of the chapter in your own words.</div>
        <textarea id="wsBox" placeholder="Type here..."></textarea>

        <div class="divider"></div>

        <h2 style="margin-top:0;">Glossary</h2>
        <div class="small">Tap a purple word in the text to see a pop-up meaning.</div>
        <div class="divider"></div>
        <div id="glossaryHint" class="small">No word selected yet.</div>

        <div class="divider"></div>
        <button class="btn" id="speakWordBtn" disabled>🔊 Read Word + Meaning</button>
      </div>
    </div>
  </div>

  <div class="popup" id="popup">
    <div class="popupHeader">
      <div class="popupTitle" id="popupTitle">Word</div>
      <button class="closeBtn" id="closePopup">Close</button>
    </div>
    <div class="small" id="popupBody"></div>
  </div>

  <div class="popup" id="chaptersPopup">
    <div class="popupHeader">
      <div class="popupTitle">Choose a Chapter</div>
      <button class="closeBtn" id="closeChaptersPopup">Close</button>
    </div>
    <div id="chaptersList"></div>
  </div>

  <div class="popup" id="dictSearchPopup">
    <div class="popupHeader">
      <div class="popupTitle">Search Dictionary</div>
      <button class="closeBtn" id="closeDictSearchPopup">Close</button>
    </div>
    <input
      type="text"
      id="dictSearchInput"
      class="searchBox"
      placeholder="Type a word..."
      autocomplete="off"
    />
    <div id="dictSearchResults"></div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const bookId = params.get("book");
  const chapterId = params.get("chapter");

  const statusEl = document.getElementById("status");
  const chapterTitleEl = document.getElementById("chapterTitle");
  const chapterMetaEl = document.getElementById("chapterMeta");
  const chapterTextEl = document.getElementById("chapterText");
  const chapterProgressText = document.getElementById("chapterProgressText");
  const chapterProgressBar = document.getElementById("chapterProgressBar");
  const howBtn = document.getElementById("howBtn");
  const chaptersBtn = document.getElementById("chaptersBtn");
  const dictBtn = document.getElementById("dictBtn");
  const dictSearchBtn = document.getElementById("dictSearchBtn");
  const nextChapterBtn = document.getElementById("nextChapterBtn");

  const worksheetBody = document.getElementById("worksheetBody");
  const worksheetTitleEl = document.getElementById("worksheetTitle");
  const worksheetPromptEl = document.getElementById("worksheetPrompt");
  const wsBox = document.getElementById("wsBox");

  const speakWordBtn = document.getElementById("speakWordBtn");
  const glossaryHint = document.getElementById("glossaryHint");
  let selectedTerm = null;
  let selectedDef = null;
  let chapterGlossary = {};

  const popup = document.getElementById("popup");
  const popupTitle = document.getElementById("popupTitle");
  const popupBody = document.getElementById("popupBody");
  const closePopup = document.getElementById("closePopup");

  const chaptersPopup = document.getElementById("chaptersPopup");
  const closeChaptersPopup = document.getElementById("closeChaptersPopup");
  const chaptersList = document.getElementById("chaptersList");

  const dictSearchPopup = document.getElementById("dictSearchPopup");
  const closeDictSearchPopup = document.getElementById("closeDictSearchPopup");
  const dictSearchInput = document.getElementById("dictSearchInput");
  const dictSearchResults = document.getElementById("dictSearchResults");
  let dictionaryWordsData = [];

  const recBtn = document.getElementById("recBtn");
  const stopRecBtn = document.getElementById("stopRecBtn");
  const playBtn = document.getElementById("playBtn");
  const clearBtn = document.getElementById("clearBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  const recStatus = document.getElementById("recStatus");
  const player = document.getElementById("player");

  let mediaRecorder = null;
  let chunks = [];
  let audioBlob = null;
  let audioUrl = null;

  function setStatus(msg){
    statusEl.textContent = msg || "";
  }

  function wsKey(){
    return `rf_ws_${bookId}_${chapterId}`;
  }

  function escapeHtml(s){
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  function loadWorksheet(ch){
    const ws = ch.worksheet || null;

    if(ws && ws.title){
      worksheetTitleEl.textContent = ws.title;
    } else {
      worksheetTitleEl.textContent = "Worksheet";
    }

    if(ws && ws.prompt){
      worksheetPromptEl.textContent = ws.prompt;
    } else {
      worksheetPromptEl.textContent = "Type your answers here.";
    }

    const saved = localStorage.getItem(wsKey());
    if(saved){
      wsBox.value = saved;
    } else {
      wsBox.value = "";
    }

    wsBox.oninput = () => {
      localStorage.setItem(wsKey(), wsBox.value);
    };
  }

  function getNextChapter(current, chapters){
    const keys = Object.keys(chapters)
      .filter(k => k !== "how-it-works")
      .sort((a, b) => {
        const ma = /^ch(\d+)$/i.exec(a);
        const mb = /^ch(\d+)$/i.exec(b);

        if (ma && mb) return Number(ma[1]) - Number(mb[1]);
        if (ma) return -1;
        if (mb) return 1;

        return a.localeCompare(b);
      });

    const index = keys.indexOf(current);

    if (index >= 0 && index < keys.length - 1) {
      return keys[index + 1];
    }

    return null;
  }

  function getOrderedChapterKeys(chapters){
    return Object.keys(chapters)
      .filter(k => k !== "how-it-works")
      .sort((a, b) => {
        const ma = /^ch(\d+)$/i.exec(a);
        const mb = /^ch(\d+)$/i.exec(b);

        if (ma && mb) return Number(ma[1]) - Number(mb[1]);
        if (ma) return -1;
        if (mb) return 1;

        return a.localeCompare(b);
      });
  }

  function getAllChapterKeys(chapters){
    return Object.keys(chapters).sort((a, b) => {
      if (a === "how-it-works") return -1;
      if (b === "how-it-works") return 1;

      const ma = /^ch(\d+)$/i.exec(a);
      const mb = /^ch(\d+)$/i.exec(b);

      if (ma && mb) return Number(ma[1]) - Number(mb[1]);
      if (ma) return -1;
      if (mb) return 1;

      return a.localeCompare(b);
    });
  }

  function renderChapterMenu(chapters){
    const orderedKeys = getAllChapterKeys(chapters);

    chaptersList.innerHTML = orderedKeys.map(key => {
      const ch = chapters[key];
      const currentClass = key === chapterId ? " current" : "";
      return `
        <div class="chapter-link${currentClass}" data-chapter="${escapeHtml(key)}">
          ${escapeHtml(ch.title || key)}
        </div>
      `;
    }).join("");

    chaptersList.querySelectorAll(".chapter-link").forEach(el => {
      el.addEventListener("click", () => {
        const targetChapter = el.getAttribute("data-chapter");
        hideChaptersPopup();
        location.href = `book.html?book=${encodeURIComponent(bookId)}&chapter=${encodeURIComponent(targetChapter)}`;
      });
    });
  }

  function showChaptersPopup(){
    chaptersPopup.style.display = "block";
  }

  function hideChaptersPopup(){
    chaptersPopup.style.display = "none";
  }

  function showDictSearchPopup(){
    dictSearchPopup.style.display = "block";
    dictSearchInput.value = "";
    renderDictionarySearchResults(dictionaryWordsData);
    setTimeout(() => dictSearchInput.focus(), 0);
  }

  function hideDictSearchPopup(){
    dictSearchPopup.style.display = "none";
  }

  function renderDictionarySearchResults(words){
    if(!words.length){
      dictSearchResults.innerHTML = `<div class="search-empty">No words found.</div>`;
      return;
    }

    dictSearchResults.innerHTML = words.map(entry => `
      <div class="search-result" data-word="${escapeHtml(entry.word || "")}">
        <strong>${escapeHtml(entry.word || "")}</strong><br>
        <span class="small">${escapeHtml(entry.definition || "")}</span>
      </div>
    `).join("");

    dictSearchResults.querySelectorAll(".search-result").forEach(el => {
      el.addEventListener("click", () => {
        const selectedWord = (el.getAttribute("data-word") || "").toLowerCase();
        hideDictSearchPopup();

        const target = chapterTextEl.querySelector(`[data-word="${CSS.escape(selectedWord)}"]`);
        if(target){
          target.scrollIntoView({ behavior: "smooth", block: "start" });
          target.style.borderColor = "#7b3ff2";
          target.style.boxShadow = "0 0 0 3px rgba(123,63,242,0.12)";
          setTimeout(() => {
            target.style.borderColor = "#eee";
            target.style.boxShadow = "none";
          }, 1800);
        }
      });
    });
  }

  async function loadBookIndex(){
    const res = await fetch("./data/books.json", { cache: "no-store" });
    if(!res.ok) throw new Error("Could not fetch books.json (" + res.status + ")");
    return await res.json();
  }

  async function loadBookData(bookIndexEntry){
    if(bookIndexEntry?.dataFile){
      const res = await fetch(bookIndexEntry.dataFile, { cache: "no-store" });
      if(!res.ok) throw new Error("Could not fetch " + bookIndexEntry.dataFile + " (" + res.status + ")");
      return await res.json();
    }
    return bookIndexEntry;
  }

  async function loadDictionary(){
    const res = await fetch("./data/dictionary.json", { cache: "no-store" });
    if (!res.ok) throw new Error("Could not fetch dictionary.json (" + res.status + ")");

    const data = await res.json();

    chapterTitleEl.textContent = data.title || "Dictionary";
    chapterMetaEl.textContent = "A–D";
    chapterProgressText.textContent = "";
    chapterProgressBar.style.width = "0%";
    nextChapterBtn.style.display = "none";
    howBtn.style.display = "none";
    chaptersBtn.style.display = "none";
    dictSearchBtn.style.display = "";
    dictSearchBtn.onclick = showDictSearchPopup;

    recBtn.style.display = "none";
    stopRecBtn.style.display = "none";
    playBtn.style.display = "none";
    clearBtn.style.display = "none";
    downloadBtn.style.display = "none";
    recStatus.textContent = "";
    player.style.display = "none";

    const prologueTitle = data.prologue?.title || "How to Use This Dictionary";
    const intro = data.prologue?.intro || "";
    const parts = Array.isArray(data.prologue?.parts) ? data.prologue.parts : [];
    const searchHelp = data.prologue?.searchHelp || "";
    const words = Array.isArray(data.words) ? data.words : [];

    dictionaryWordsData = words;

    chapterTextEl.innerHTML = `
      <h2>${escapeHtml(prologueTitle)}</h2>
      <p>${escapeHtml(intro)}</p>

      ${parts.map(part => `
        <p><strong>${escapeHtml(part.name)}:</strong> ${escapeHtml(part.explanation)}</p>
      `).join("")}

      <p><strong>Search:</strong> ${escapeHtml(searchHelp)}</p>

      <hr style="margin: 24px 0;">

      <div id="dictionaryEntriesWrap"></div>
    `;

    const dictionaryEntriesWrap = document.getElementById("dictionaryEntriesWrap");
    dictionaryEntriesWrap.innerHTML = words.map((entry, index) => `
      <div class="dictionary-entry" id="dict-word-${index}" data-word="${escapeHtml((entry.word || "").toLowerCase())}">
        <h3>${escapeHtml(entry.word || "")}</h3>
        <p><strong>Part of Speech:</strong> ${escapeHtml(entry.partOfSpeech || "-")}</p>
        <p><strong>Syllables:</strong> ${
          Array.isArray(entry.syllables)
            ? entry.syllables.map(s => escapeHtml(s)).join(" - ")
            : "-"
        }</p>
        <p><strong>Definition:</strong> ${escapeHtml(entry.definition || "-")}</p>
        <p><strong>Example:</strong> ${escapeHtml(entry.example || "-")}</p>
      </div>
    `).join("");

    worksheetBody.innerHTML = `
      <h2 style="margin-top:0;">Dictionary</h2>
      <div class="small">Use the Search button to find words quickly.</div>
    `;

    setStatus("Ready");
  }

  async function loadChapter(){
    try{
      if (bookId === "dictionary") {
        await loadDictionary();
        return;
      }

      const indexData = await loadBookIndex();
      const bookIndexEntry = indexData.books?.[bookId];
      if(!bookIndexEntry) throw new Error("Book not found: " + bookId);

      const bookData = await loadBookData(bookIndexEntry);
      const chapters = bookData.chapters || {};
      const ch = chapters?.[chapterId];
      if(!ch) throw new Error("Chapter not found: " + chapterId);

      renderChapterMenu(chapters);

      const orderedKeys = getOrderedChapterKeys(chapters);
      const currentIndex = orderedKeys.indexOf(chapterId);

      if(currentIndex >= 0){
        const chapterNumber = currentIndex + 1;
        const totalChapters = orderedKeys.length;
        const percent = (chapterNumber / totalChapters) * 100;

        chapterProgressText.textContent = `Chapter ${chapterNumber} of ${totalChapters}`;
        chapterProgressBar.style.width = `${percent}%`;
      } else {
        chapterProgressText.textContent = chapterId === "how-it-works" ? "How This Works" : "";
        chapterProgressBar.style.width = "0%";
      }

      chapterTitleEl.textContent = ch.title || chapterId;
      chapterMetaEl.textContent = `${bookData.title || bookIndexEntry.title || bookId} • ${chapterId}`;

      howBtn.style.display = "";
      howBtn.onclick = () => {
        const howId = "how-it-works";
        if(chapters?.[howId]){
          location.href = `book.html?book=${encodeURIComponent(bookId)}&chapter=${encodeURIComponent(howId)}`;
        } else {
          alert("No 'How This Works' chapter yet for this book.");
        }
      };

      chaptersBtn.style.display = "";
      chaptersBtn.onclick = showChaptersPopup;

      dictBtn.style.display = "";
      dictBtn.onclick = () => {
        location.href = `book.html?book=dictionary&chapter=main`;
      };

      dictSearchBtn.style.display = "none";

      const next = getNextChapter(chapterId, chapters);
      if(next){
        nextChapterBtn.style.display = "";
        nextChapterBtn.onclick = () => {
          location.href = `book.html?book=${encodeURIComponent(bookId)}&chapter=${encodeURIComponent(next)}`;
        };
      } else {
        nextChapterBtn.style.display = "none";
      }

      chapterGlossary = ch.glossary || {};
      renderText(ch.content || []);
      loadWorksheet(ch);

      localStorage.setItem(`rf_last_${bookId}`, chapterId);

      setStatus("Ready");
    }catch(e){
      chapterTitleEl.textContent = "Could not load chapter";
      chapterMetaEl.textContent = "";
      chapterTextEl.innerHTML = `<p>${escapeHtml(e.message)}</p>`;
      chapterProgressText.textContent = "";
      chapterProgressBar.style.width = "0%";
      nextChapterBtn.style.display = "none";
      chaptersBtn.style.display = "none";
      dictSearchBtn.style.display = "none";
      setStatus("Error");
    }
  }

  function showPopup(termKey, entry){
    popupTitle.textContent = termKey;
    popupBody.innerHTML = `
      <div><b>Pronunciation:</b> ${escapeHtml(entry.pronunciation || "-")}</div>
      <div style="margin-top:6px;"><b>Meaning:</b> ${escapeHtml(entry.definition || "-")}</div>
      ${entry.simpleMeaning ? `<div style="margin-top:10px;"><b>Simple meaning:</b> ${escapeHtml(entry.simpleMeaning)}</div>` : ""}
      ${entry.example ? `<div style="margin-top:10px;"><b>Example:</b> ${escapeHtml(entry.example)}</div>` : ""}
    `;
    popup.style.display = "block";
  }

  function hidePopup(){
    popup.style.display = "none";
  }

  closePopup.addEventListener("click", hidePopup);

  popup.addEventListener("click", (e) => {
    if(e.target === popup){
      hidePopup();
    }
  });

  closeChaptersPopup.addEventListener("click", hideChaptersPopup);

  chaptersPopup.addEventListener("click", (e) => {
    if(e.target === chaptersPopup){
      hideChaptersPopup();
    }
  });

  closeDictSearchPopup.addEventListener("click", hideDictSearchPopup);

  dictSearchPopup.addEventListener("click", (e) => {
    if(e.target === dictSearchPopup){
      hideDictSearchPopup();
    }
  });

  dictSearchInput.addEventListener("input", () => {
    const query = dictSearchInput.value.trim().toLowerCase();

    if(!query){
      renderDictionarySearchResults(dictionaryWordsData);
      return;
    }

    const filtered = dictionaryWordsData.filter(entry => {
      const word = (entry.word || "").toLowerCase();
      const definition = (entry.definition || "").toLowerCase();
      return word.includes(query) || definition.includes(query);
    });

    renderDictionarySearchResults(filtered);
  });

  function renderText(paragraphs){
    const html = paragraphs.map(p => {
      const safe = escapeHtml(p);
      const withTerms = safe.replace(/\[\[([^\]]+)\]\]/g, (m, term) => {
        const key = term.toLowerCase().trim();
        return `<span class="term" data-term="${escapeHtml(key)}">${escapeHtml(term)}</span>`;
      });
      return `<p>${withTerms}</p>`;
    }).join("");

    chapterTextEl.innerHTML = html;

    chapterTextEl.querySelectorAll(".term").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.getAttribute("data-term");
        const entry = chapterGlossary[key];

        selectedTerm = key;
        selectedDef = entry || null;

        if(!entry){
          glossaryHint.innerHTML = `<b>${escapeHtml(key)}</b><div class="small">No definition added yet.</div>`;
          speakWordBtn.disabled = true;
          return;
        }

        glossaryHint.innerHTML = `<b>${escapeHtml(key)}</b> selected.`;
        speakWordBtn.disabled = false;
        showPopup(key, entry);
      });
    });
  }

  function speak(text){
    if(!("speechSynthesis" in window)){
      alert("Text-to-speech is not supported on this browser.");
      return;
    }

    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(u);
  }

  speakWordBtn.addEventListener("click", () => {
    if(!selectedTerm || !selectedDef) return;

    const text = `${selectedTerm}. Pronunciation: ${selectedDef.pronunciation || ""}. Meaning: ${selectedDef.definition || ""}`;
    speak(text);
  });

  async function startRecording(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];

      mediaRecorder.ondataavailable = e => chunks.push(e.data);

      mediaRecorder.onstop = () => {
        audioBlob = new Blob(chunks, { type: "audio/webm" });

        if(audioUrl){
          URL.revokeObjectURL(audioUrl);
        }

        audioUrl = URL.createObjectURL(audioBlob);
        player.src = audioUrl;
        player.style.display = "block";

        playBtn.disabled = false;
        clearBtn.disabled = false;
        downloadBtn.disabled = false;

        recStatus.textContent = "Recording saved (on this page).";
        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start();
      recStatus.textContent = "Recording…";
      recBtn.disabled = true;
      stopRecBtn.disabled = false;
    }catch(err){
      recStatus.textContent = "Mic permission blocked. Allow microphone access.";
    }
  }

  function stopRecording(){
    if(mediaRecorder && mediaRecorder.state !== "inactive"){
      mediaRecorder.stop();
      recBtn.disabled = false;
      stopRecBtn.disabled = true;
    }
  }

  function playRecording(){
    if(!audioUrl) return;
    player.play();
  }

  function clearRecording(){
    audioBlob = null;

    if(audioUrl){
      URL.revokeObjectURL(audioUrl);
    }

    audioUrl = null;
    player.pause();
    player.removeAttribute("src");
    player.style.display = "none";

    playBtn.disabled = true;
    clearBtn.disabled = true;
    downloadBtn.disabled = true;

    recStatus.textContent = "Cleared.";
  }

  function downloadRecording(){
    if(!audioBlob) return;

    const a = document.createElement("a");
    const filename = `${bookId}-${chapterId}-reading.webm`;
    a.href = audioUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  recBtn.addEventListener("click", startRecording);
  stopRecBtn.addEventListener("click", stopRecording);
  playBtn.addEventListener("click", playRecording);
  clearBtn.addEventListener("click", clearRecording);
  downloadBtn.addEventListener("click", downloadRecording);

  loadChapter();
</script>

</body>
</html>
