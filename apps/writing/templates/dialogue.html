<style>
  :root {
    --surface: #ffffff;
    --surface-soft: #f8fbff;
    --text: #1f2937;
    --muted: #667085;
    --line: #d9e2f0;
    --primary: #7c3aed;
    --success: #16a34a;
    --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    --max-width: 1200px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top right, #ede9fe 0%, transparent 24%),
      linear-gradient(180deg, #faf9ff 0%, #f4f5fb 100%);
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  .page {
    width: min(var(--max-width), calc(100% - 28px));
    margin: 0 auto;
    padding: 24px 0 42px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
  }

  .brand-badge {
    width: 46px;
    height: 46px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    color: white;
    background: linear-gradient(135deg, #7c3aed, #a78bfa);
    box-shadow: var(--shadow);
  }

  .nav-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .nav-links a {
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.85);
    color: var(--muted);
    font-weight: 700;
    font-size: 0.95rem;
  }

  .hero {
    background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
    color: white;
    border-radius: 28px;
    padding: 26px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }

  .hero h1 {
    margin: 0 0 8px;
    font-size: clamp(1.9rem, 5vw, 2.5rem);
  }

  .hero p {
    margin: 0;
    line-height: 1.6;
    max-width: 780px;
    color: rgba(255, 255, 255, 0.94);
  }

  .workspace {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 28px;
    box-shadow: var(--shadow);
    padding: 18px;
  }

  .workspace-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    min-height: 620px;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: 22px;
    overflow: hidden;
    background: white;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: #faf7ff;
  }

  .panel-header h2,
  .panel-header h3 {
    margin: 0 0 6px;
    font-size: 1rem;
  }

  .panel-header p {
    margin: 0;
    color: var(--muted);
    line-height: 1.5;
    font-size: 0.92rem;
  }

  .panel-scroll {
    padding: 16px;
    overflow: auto;
    flex: 1;
  }

  .info-box {
    border: 1px solid #ece8f7;
    background: var(--surface-soft);
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 12px;
  }

  .info-box strong {
    display: block;
    margin-bottom: 8px;
  }

  .info-box p,
  .info-box li {
    line-height: 1.6;
  }

  .info-box p {
    margin: 0;
  }

  .info-box ul {
    margin: 0;
    padding-left: 18px;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 14px;
    border-bottom: 1px solid var(--line);
    background: #fcfdff;
  }

  .tool-btn {
    border: 1px solid var(--line);
    background: white;
    border-radius: 12px;
    padding: 10px 12px;
    cursor: pointer;
    font-weight: 800;
    color: #374151;
  }

  .writer-area {
    padding: 14px;
    border-bottom: 1px solid var(--line);
    background: white;
  }

  .writer-area input[type="text"] {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .editor {
    min-height: 300px;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px;
    outline: none;
    line-height: 1.7;
    font-size: 1rem;
    background: white;
    overflow: auto;
    white-space: pre-wrap;
  }

  .editor:empty:before {
    content: attr(data-placeholder);
    color: #98a2b3;
  }

  .writer-footer {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    padding: 14px;
    background: #fcfdff;
  }

  .word-count {
    font-weight: 800;
  }

  .word-count span {
    color: var(--primary);
  }

  .btn {
    border: none;
    cursor: pointer;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 800;
    font-size: 0.95rem;
  }

  .btn-submit {
    background: var(--success);
    color: white;
  }

  .results {
    margin-top: 16px;
    display: none;
  }

  .results.show {
    display: block;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .result-box {
    border: 1px solid var(--line);
    background: white;
    border-radius: 20px;
    padding: 16px;
  }

  .result-box h3 {
    margin: 0 0 10px;
    font-size: 1rem;
  }

  .result-box ul {
    margin: 0;
    padding-left: 18px;
    line-height: 1.65;
  }

  .result-box p {
    margin: 0;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .spell-error {
    text-decoration: underline wavy red;
    text-decoration-thickness: 2px;
    cursor: pointer;
    background: rgba(255, 0, 0, 0.04);
  }

  .grammar-error {
    border: 2px solid #dc2626;
    border-radius: 6px;
    padding: 1px 2px;
    background: rgba(220, 38, 38, 0.06);
    cursor: pointer;
  }

  .correct-text {
    background: rgba(34, 197, 94, 0.12);
    border-bottom: 2px solid #22c55e;
    border-radius: 4px;
  }

  .correct-sentence {
    border: 2px solid #22c55e;
    border-radius: 10px;
    background: rgba(34, 197, 94, 0.08);
    padding: 4px 6px;
    display: inline;
  }

  .suggestion-popup {
    position: absolute;
    z-index: 50;
    background: white;
    border: 1px solid #d8deea;
    border-radius: 12px;
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    padding: 10px;
    min-width: 220px;
  }

  .suggestion-popup button {
    display: block;
    width: 100%;
    text-align: left;
    margin: 6px 0 0;
    padding: 8px 10px;
    border: 1px solid #d8deea;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
  }

  @media (max-width: 1000px) {
    .workspace-grid,
    .results-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 700px) {
    .page {
      width: min(100% - 18px, var(--max-width));
    }

    .topbar {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
